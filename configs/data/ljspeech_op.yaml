# LJSpeech with filelists pre-phonemized by the espeak-free G2P lane
# (scripts/phonemize_filelist.py → matcha/text/op_g2p.py). Text in the
# *_op filelists is already espeak-style IPA over the locked vocab, so the
# only "cleaner" is the identity — the training container needs neither
# espeak-ng nor the phonemizer package.
_target_: matcha.data.text_mel_datamodule.TextMelDataModule
name: ljspeech_op
train_filelist_path: data/LJSpeech-1.1/train_op.txt
valid_filelist_path: data/LJSpeech-1.1/val_op.txt
batch_size: 32
num_workers: 20
pin_memory: True
cleaners: [no_cleaners]
add_blank: True
n_spks: 1
n_fft: 1024
n_feats: 80
sample_rate: 22050
hop_length: 256
win_length: 1024
f_min: 0
f_max: 8000
data_statistics:  # Computed for ljspeech dataset
  mel_mean: -5.536622
  mel_std: 2.116101
seed: ${seed}
load_durations: false
